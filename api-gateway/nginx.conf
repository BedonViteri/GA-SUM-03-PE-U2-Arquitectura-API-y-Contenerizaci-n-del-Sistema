events {
    worker_connections 1024;
}

http {
    # Rate limiting: maximo 100 peticiones por minuto por IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;

    # Logging: timestamp, metodo, ruta, IP, codigo de respuesta
    log_format gateway_log '$time_iso8601 | metodo=$request_method | '
                            'ruta=$request_uri | ip=$remote_addr | '
                            'status=$status | tiempo=${request_time}s';

    access_log /var/log/nginx/access.log gateway_log;
    error_log  /var/log/nginx/error.log warn;

    upstream auth_service {
        server auth-service:8001;
    }

    upstream resource_service {
        server resource-service:8002;
    }

    upstream notification_service {
        server notification-service:8003;
    }

    server {
        listen 8080;

        location /api/auth/ {
            limit_req zone=api_limit burst=20 nodelay;
            rewrite ^/api/auth/(.*) /auth/$1 break;
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/resources/ {
            limit_req zone=api_limit burst=20 nodelay;
            rewrite ^/api/resources/(.*) /resources/$1 break;
            proxy_pass http://resource_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/notifications/ {
            limit_req zone=api_limit burst=20 nodelay;
            rewrite ^/api/notifications/(.*) /notifications/$1 break;
            proxy_pass http://notification_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /health {
            return 200 '{"status":"success","message":"API Gateway activo"}';
            add_header Content-Type application/json;
        }
    }
}